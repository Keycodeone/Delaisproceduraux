<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="Calculateur de délais procéduraux pour avocats — jours fériés français intégrés, export calendrier et PDF." />
  <meta name="theme-color" content="#4B2E9A" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Délais proc." />

  <title>Délais procéduraux</title>

  <link rel="manifest" href="webmanifest.json" />
  <link rel="apple-touch-icon" href="icons/icon_192px.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- ===== En-tête ===== -->
  <header class="app-header">
    <img src="icons/balance_50px.png" alt="" class="header-icon" aria-hidden="true" />
    <h1>Délais procéduraux</h1>
    <img src="icons/balance_50px.png" alt="" class="header-icon" aria-hidden="true" />
  </header>

  <!-- ===== Formulaire principal ===== -->
  <main class="main-content">
    <form id="delaisForm" novalidate>

      <!-- Type d'acte -->
      <div class="form-group">
        <label for="typeActe"><strong>Type d'acte</strong></label>
        <select id="typeActe" name="typeActe" required aria-required="true">
          <option value="" disabled selected>— Sélectionner un type —</option>
          <option value="10">Formation d'Opposition (10 j)</option>
          <option value="15">Réponse à Assignation (15 j)</option>
          <option value="60_contestation">Contestation de Décision (60 j)</option>
          <option value="10_appel">Interjeter un Appel (10 j)</option>
          <option value="60_cassation">Pourvoi en Cassation (60 j)</option>
          <option value="60_admin">Recours Administratif (60 j)</option>
          <option value="90">Dépôt de Conclusions (90 j)</option>
          <option value="autre">Autre (durée libre)</option>
        </select>
        <span class="field-error" id="typeActeError" role="alert" aria-live="polite"></span>
      </div>

      <!-- Durée libre (Autre) -->
      <div class="form-group form-group--conditional" id="autreGroup" aria-hidden="true">
        <label for="autreJours"><strong>Nombre de jours</strong></label>
        <input
          type="number"
          id="autreJours"
          name="autreJours"
          min="1"
          max="3650"
          placeholder="Ex : 45"
          aria-describedby="autreJoursError"
        />
        <span class="field-error" id="autreJoursError" role="alert" aria-live="polite"></span>
      </div>

      <!-- Date de notification -->
      <div class="form-group">
        <label for="dateNotif"><strong>Date de notification</strong></label>
        <input
          type="date"
          id="dateNotif"
          name="dateNotif"
          required
          aria-required="true"
          aria-describedby="dateNotifError"
        />
        <span class="field-error" id="dateNotifError" role="alert" aria-live="polite"></span>
      </div>

      <!-- Ajustement -->
      <div class="form-group">
        <div class="checkbox-row">
          <input type="checkbox" id="ajustCheck" name="ajustCheck" />
          <label for="ajustCheck">Augmentation ou diminution du délai</label>
        </div>
        <div class="form-group--conditional" id="ajustGroup" aria-hidden="true">
          <label for="ajustJours" class="sr-only"><strong>Ajustement en jours</strong></label>
          <div class="signed-input-wrap">
            <select id="ajustSigne" name="ajustSigne" aria-label="Signe de l'ajustement">
              <option value="+">+</option>
              <option value="-">−</option>
            </select>
            <input
              type="number"
              id="ajustJours"
              name="ajustJours"
              min="1"
              max="3650"
              placeholder="Nb de jours"
              aria-describedby="ajustError"
            />
          </div>
          <span class="field-error" id="ajustError" role="alert" aria-live="polite"></span>
        </div>
      </div>

      <!-- Remarques -->
      <div class="form-group">
        <label for="remarques"><strong>Remarques</strong></label>
        <textarea
          id="remarques"
          name="remarques"
          maxlength="30"
          rows="2"
          placeholder="Note optionnelle…"
          aria-describedby="remarquesCount"
        ></textarea>
        <span class="char-counter" id="remarquesCount" aria-live="polite">0/30</span>
      </div>

      <!-- Bouton calculer -->
      <button type="submit" id="btnCalculer" class="btn-calculer">
        <span class="btn-text">Calculer</span>
        <span class="shimmer" aria-hidden="true"></span>
      </button>

    </form>
  </main>

  <!-- ===== Modal de résultats ===== -->
  <div id="resultatModal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle" hidden>
    <div class="modal-box">
      <button class="modal-close" id="modalClose" aria-label="Fermer">&times;</button>
      <h2 id="modalTitle" class="modal-title">Résultat</h2>

      <dl class="result-list" id="resultList"></dl>

      <p class="result-date-label">Date limite</p>
      <p class="result-date" id="resultDate" aria-live="polite"></p>

      <div class="modal-actions">
        <button id="btnExportCal" class="btn-action btn-action--cal">
          Exporter vers le calendrier
        </button>
        <button id="btnExportPDF" class="btn-action btn-action--pdf">
          Télécharger PDF
        </button>
      </div>
    </div>
  </div>

  <!-- jsPDF via CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" crossorigin="anonymous"></script>
  <script src="app.js"></script>
</body>
</html>
