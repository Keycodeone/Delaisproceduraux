<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Délais procéduraux</title>
    <link rel="manifest" href="webmanifest.json">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
    <header>
        <img src="icons/balance_50px.png" alt="Balance" class="icon-left">
        <h1>Délais procéduraux</h1>
        <img src="icons/balance_50px.png" alt="Balance" class="icon-right">
    </header>
    
    <form id="deadlineForm" class="form-container">
        <label><strong>Type d'acte</strong></label>
        <select id="acteType">
            <option value="10">Formation d'Opposition (10 jours)</option>
            <option value="15">Réponse à Assignation (15 jours)</option>
            <option value="60">Contestation de Décision (60 jours)</option>
            <option value="30">Déclaration d'Appel (30 jours)</option>
            <option value="60">Pourvoi en Cassation (60 jours)</option>
            <option value="60">Recours Administratif (60 jours)</option>
            <option value="90">Dépôt de Conclusions (90 jours)</option>
            <option value="custom">Autre (saisir la durée ci-dessous)</option>
        </select>
        
        <label><strong>Durée spécifique (jours)</strong></label>
        <input type="number" id="customDuration" min="1" style="display:none;" placeholder="Ex: 45">
        
        <label><strong>Date de notification</strong></label>
        <input type="date" id="notificationDate" required>
        
        <label class="checkbox-label">
            <input type="checkbox" id="adjustment">
            <strong>Augmentation ou Diminution du délai</strong>
        </label>
        <input type="text" id="adjustmentDays" placeholder="+/- jours (ex: +5 ou -3)" style="display:none;">
        
        <label><strong>Remarques éventuelles</strong></label>
        <textarea id="remarks" maxlength="30" placeholder="Max 30 caractères"></textarea>
        <span id="charCount">0/30</span>
        
        <button type="submit" id="calculateBtn">Calculer</button>
    </form>
    
    <div id="resultModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Résultats</h2>
            <div id="resultDetails"></div>
            <button id="exportCalendar">Export Calendrier</button>
            <button id="exportPDF">Générer PDF</button>
        </div>
    </div>
    
    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js');
        }
    </script>
</body>
</html>
